<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sliding</title>
<style>
*{
    margin:0;
    padding: 0;
}
body{
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
}
.main-container{
    width: 500px;
    height: 500px;
    background: rgba(102, 205, 171, 0.223);
    border: 4px solid black ;
    box-shadow: 0px 10px 25px rgba(0, 0, 0, 3);
    border-radius: 7%;
    position: relative;
}
.sub-main{
    width: 100px;
    height: 100px;
    background: darkblue;
    /* border: 4px solid black; */
    border-radius: 30%;
    position: absolute;
    animation-name: example;
    animation-duration: 8s;
    animation-delay: 2s;
    animation-iteration-count: 2;
    animation-timing-function: linear;
    /* animation: example 8s 2s 2 linear; */
}
@keyframes example {
    0% {background-color: darkblue; top: 0; left: 0;}
    25% {background-color: red; top: 0; left: 400px;}
    50% {background-color: yellow; top: 400px; left: 400px;}
    75% {background-color: slateblue; top: 400px; left: 0;}
    100% {background-color: burlywood; top: 0; left: 0;}
    
}
    </style>
</head>
<body>
    <div class="main-container">
        <div class="sub-main">

        </div>
    </div>
</body>
</html>
